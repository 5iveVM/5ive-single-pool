schema_version = 1

# 5IVE VM Project Configuration
[project]
name = "5ive-single-pool"
version = "1.0.1"
description = "5IVE VM port of SPL single-pool (targeting SPL single-pool v1.0.1 parity)"
source_dir = "src"
build_dir = "build"
entry_point = "src/main.v"
target = "vm"

[optimizations]
enable_compression = true
enable_constraint_optimization = true
optimization_level = "production"

[dependencies]
std = { package = "@5ive/std", version = "0.1.0", source = "bundled", link = "inline" }
# Cargo-style examples:
# local_math = { package = "math-lib", source = "path", path = "../math-lib", link = "inline" }
# external_oracle = { package = "@acme/oracle", source = "address", address = "SCRIPT_ACCOUNT_BASE58", link = "external" }

[build]
# Custom build settings
output_artifact_name = "main"
max_bytecode_size = 1048576  # 1MB
target_compute_units = 200000

[deploy]
# Deployment settings (cluster is canonical; network remains a legacy alias)
cluster = "localnet"
commitment = "confirmed"
rpc_url = "http://127.0.0.1:8899"
# program_id = "55555SyrYLzydvDMBhAL8uo6h4WETHTm81z8btf6nAVJ" # Five VM program on localnet
